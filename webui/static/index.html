<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEC Mesh Messenger</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232733;
            --accent: #6c63ff;
            --accent2: #4ecdc4;
            --green: #4ecdc4;
            --red: #ff6b6b;
            --yellow: #ffe66d;
            --text: #e8e8e8;
            --text2: #8b8fa3;
            --border: #2d3140;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .header .info {
            font-size: 11px;
            opacity: 0.85;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-dot.on {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-dot.off {
            background: var(--red);
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
        }

        .tab {
            flex: 0 0 auto;
            padding: 9px 14px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            color: var(--text2);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab.dm-tab {
            color: var(--accent2);
        }

        .tab.dm-tab.active {
            border-bottom-color: var(--accent2);
        }

        .tab .unread {
            background: var(--red);
            color: #fff;
            font-size: 9px;
            border-radius: 8px;
            padding: 1px 5px;
            margin-left: 4px;
        }

        .panel {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .panel.active {
            display: flex;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            background: var(--surface);
            padding: 8px 10px;
            border-radius: 10px;
            max-width: 85%;
            border-left: 3px solid var(--accent);
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
            }
        }

        .msg.self {
            align-self: flex-end;
            border-left: none;
            border-right: 3px solid var(--accent2);
            background: var(--surface2);
        }

        .msg.dm-msg {
            border-left-color: var(--accent2);
        }

        .msg.dm-msg.self {
            border-right-color: var(--accent2);
        }

        .msg .nick {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
        }

        .msg.self .nick {
            color: var(--accent2);
        }

        .msg .trust-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 6px;
            margin-left: 4px;
        }

        .trust-badge.verified {
            background: rgba(78, 205, 196, 0.2);
            color: var(--green);
        }

        .trust-badge.unverified {
            background: rgba(255, 230, 109, 0.2);
            color: var(--yellow);
        }

        .msg .text {
            margin-top: 3px;
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg .time {
            font-size: 9px;
            color: var(--text2);
            margin-top: 3px;
        }

        .input-bar {
            display: flex;
            padding: 8px 10px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            gap: 6px;
            flex-shrink: 0;
        }

        .input-bar input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 9px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 9px 16px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn.danger {
            background: var(--red);
        }

        .btn.success {
            background: var(--green);
            color: var(--bg);
        }

        .btn.small {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 10px;
        }

        .peer-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .peer-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .peer-card .peer-id {
            font-family: monospace;
            font-size: 10px;
            color: var(--text2);
            word-break: break-all;
        }

        .peer-card .sn {
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 2px;
            margin: 4px 0;
        }

        .peer-card .actions {
            display: flex;
            gap: 5px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .call-panel {
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 10px;
            color: var(--text2);
            margin-top: 3px;
        }

        .node-info {
            padding: 14px;
            flex: 1;
            overflow-y: auto;
        }

        .info-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .info-card label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
        }

        .info-card .value {
            font-family: monospace;
            font-size: 12px;
            margin-top: 3px;
            word-break: break-all;
            line-height: 1.4;
        }

        .info-card .safety-number {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            margin-top: 4px;
        }

        .empty-state {
            color: var(--text2);
            text-align: center;
            padding: 40px 20px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1>🔗 NEC Mesh</h1>
            <div class="info"><span class="status-dot" id="ws-status"></span><span id="conn-text">Connecting...</span>
            </div>
        </div>
        <div style="text-align:right">
            <div id="nick-display" style="font-weight:600;font-size:13px"></div>
            <div id="peer-count" style="font-size:10px;opacity:0.8">0 peers</div>
        </div>
    </div>

    <div class="tabs" id="tab-bar">
        <div class="tab active" data-panel="chat">💬 All</div>
        <div class="tab" data-panel="peers">👥 Peers</div>
        <div class="tab" data-panel="calls">📞 Call</div>
        <div class="tab" data-panel="info">ℹ️ Node</div>
    </div>

    <!-- Global Chat -->
    <div class="panel active" id="panel-chat">
        <div class="messages" id="messages"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Message everyone..." autocomplete="off">
            <button class="btn" onclick="sendChat()">Send</button>
        </div>
    </div>

    <!-- Peers -->
    <div class="panel" id="panel-peers">
        <div class="peer-list" id="peer-list">
            <div class="empty-state">Looking for peers on the network...</div>
        </div>
    </div>

    <!-- Calls -->
    <div class="panel" id="panel-calls">
        <div class="call-panel">
            <div id="call-status" style="font-size:14px;color:var(--text2)">No active call</div>
            <div class="stat-grid" id="call-stats" style="display:none">
                <div class="stat-card">
                    <div class="value" id="stat-latency">–</div>
                    <div class="label">Latency ms</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-jitter">–</div>
                    <div class="label">Jitter ms</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-sent">–</div>
                    <div class="label">Pkts Sent</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-recv">–</div>
                    <div class="label">Pkts Recv</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-lost">–</div>
                    <div class="label">Lost</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-loss">–</div>
                    <div class="label">Loss %</div>
                </div>
            </div>
            <button class="btn danger" id="hangup-btn" style="display:none" onclick="hangup()">🔴 Hang Up</button>
        </div>
    </div>

    <!-- Node Info -->
    <div class="panel" id="panel-info">
        <div class="node-info">
            <div class="info-card">
                <label>Safety Number</label>
                <div class="safety-number" id="info-sn">–</div>
            </div>
            <div class="info-card">
                <label>Peer ID</label>
                <div class="value" id="info-peerid">–</div>
            </div>
            <div class="info-card">
                <label>Nick</label>
                <div class="value" id="info-nick">–</div>
            </div>
            <div class="info-card">
                <label>Connect from phone</label>
                <div class="value" id="info-url" style="font-size:14px;color:var(--accent)">–</div>
            </div>
        </div>
    </div>

    <script>
let ws, myPeerID = '', myNick = '', callStatsInterval;
const dmMessages = {}; // { peerID: [{nick, text, time, isSelf}...] }

function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
        document.getElementById('ws-status').className = 'status-dot on';
        document.getElementById('conn-text').textContent = 'Connected';
        requestPeers(); fetchInfo();
    };
    ws.onclose = () => {
        document.getElementById('ws-status').className = 'status-dot off';
        document.getElementById('conn-text').textContent = 'Reconnecting...';
        setTimeout(connect, 2000);
    };
    ws.onmessage = e => handleMessage(JSON.parse(e.data));
}

function send(type, payload) {
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, payload }));
}

function handleMessage(msg) {
    switch (msg.type) {
        case 'chat': appendChat(msg.payload, false); break;
        case 'dm': handleDM(msg.payload); break;
        case 'peers': renderPeers(msg.payload); break;
        case 'trust': requestPeers(); break;
        case 'callstats': renderCallStats(msg.payload); break;
        case 'call_error': alert('Call error: ' + msg.payload.error); resetCallUI(); break;
        case 'call_ended': resetCallUI(); break;
    }
}

// ── Global Chat ────────────────────────────────────────────────
function appendChat(d, isSelf) {
    const div = document.getElementById('messages');
    const self = isSelf || d.sender === myPeerID;
    const el = document.createElement('div');
    el.className = 'msg' + (self ? ' self' : '');
    const badge = self ? '' : d.trust === 'verified'
        ? '<span class="trust-badge verified">✓</span>'
        : '<span class="trust-badge unverified">⚠</span>';
    el.innerHTML = `<div class="nick">${esc(d.nick)}${badge}</div><div class="text">${esc(d.text)}</div><div class="time">${d.timestamp}</div>`;
    div.appendChild(el);
    div.scrollTop = div.scrollHeight;
}

function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    send('send_chat', { text });
    appendChat({ sender: myPeerID, nick: myNick, text, timestamp: timeNow(), trust: 'verified' }, true);
    input.value = '';
}

// ── Direct Messages ────────────────────────────────────────────
function handleDM(d) {
    const peerID = d.sender;
    if (!dmMessages[peerID]) dmMessages[peerID] = [];
    dmMessages[peerID].push({ nick: d.nick, text: d.text, time: d.timestamp, isSelf: false, trust: d.trust });

    // Create tab if not exists.
    ensureDMTab(peerID, d.nick);

    // If DM panel is active, render it.
    if (document.getElementById('panel-dm-' + shortID(peerID))?.classList.contains('active')) {
        renderDMChat(peerID);
    } else {
        // Show unread indicator.
        const tab = document.querySelector(`[data-panel="dm-${shortID(peerID)}"]`);
        if (tab && !tab.querySelector('.unread')) {
            tab.innerHTML += '<span class="unread">!</span>';
        }
    }
}

function ensureDMTab(peerID, nick) {
    const sid = shortID(peerID);
    if (document.getElementById('panel-dm-' + sid)) return;

    // Add tab.
    const tab = document.createElement('div');
    tab.className = 'tab dm-tab';
    tab.dataset.panel = 'dm-' + sid;
    tab.textContent = '🔒 ' + (nick || sid);
    tab.addEventListener('click', () => switchTab(tab));
    document.getElementById('tab-bar').appendChild(tab);

    // Add panel.
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = 'panel-dm-' + sid;
    panel.innerHTML = `
        <div class="messages" id="dm-msgs-${sid}"></div>
        <div class="input-bar">
            <input type="text" id="dm-input-${sid}" placeholder="Private message..." autocomplete="off"
                   onkeydown="if(event.key==='Enter')sendDM('${peerID}','${sid}')">
            <button class="btn" style="background:var(--accent2)" onclick="sendDM('${peerID}','${sid}')">Send</button>
        </div>
    `;
    document.body.appendChild(panel);
}

function sendDM(peerID, sid) {
    const input = document.getElementById('dm-input-' + sid);
    const text = input.value.trim();
    if (!text) return;
    send('send_dm', { peer_id: peerID, text });
    if (!dmMessages[peerID]) dmMessages[peerID] = [];
    dmMessages[peerID].push({ nick: myNick, text, time: timeNow(), isSelf: true, trust: 'verified' });
    renderDMChat(peerID);
    input.value = '';
}

function renderDMChat(peerID) {
    const sid = shortID(peerID);
    const div = document.getElementById('dm-msgs-' + sid);
    if (!div) return;
    const msgs = dmMessages[peerID] || [];
    div.innerHTML = msgs.map(m => `
        <div class="msg dm-msg${m.isSelf ? ' self' : ''}">
            <div class="nick">${esc(m.nick)}${m.isSelf ? '' : m.trust === 'verified' ? '<span class="trust-badge verified">✓</span>' : '<span class="trust-badge unverified">⚠</span>'}</div>
            <div class="text">${esc(m.text)}</div>
            <div class="time">${m.time}</div>
        </div>
    `).join('');
    div.scrollTop = div.scrollHeight;
}

// ── Peers ──────────────────────────────────────────────────────
function renderPeers(peers) {
    const div = document.getElementById('peer-list');
    document.getElementById('peer-count').textContent = peers.length + ' peer(s)';
    if (!peers.length) {
        div.innerHTML = '<div class="empty-state">No peers found.<br>Make sure another NEC node is running on the same network.</div>';
        return;
    }
    div.innerHTML = peers.map(p => `
        <div class="peer-card">
            <div class="sn">${p.safety_number}</div>
            <div class="peer-id">${p.peer_id.substring(0, 24)}...</div>
            <div style="margin-top:3px;font-size:11px;color:var(--text2)">
                Status: <span style="color:${p.status==='verified'?'var(--green)':p.status==='blocked'?'var(--red)':'var(--yellow)'}">${p.status}</span>
            </div>
            <div class="actions">
                ${p.status !== 'verified' ? `<button class="btn small success" onclick="verifyPeer('${p.peer_id}')">✓ Verify</button>` : ''}
                <button class="btn small" style="background:var(--accent2);color:var(--bg)" onclick="openDM('${p.peer_id}')">💬 DM</button>
                <button class="btn small" onclick="callPeer('${p.peer_id}')">📞 Call</button>
            </div>
        </div>
    `).join('');
}

function requestPeers() { send('get_peers', {}); }
function verifyPeer(id) { send('verify_peer', { peer_id: id }); setTimeout(requestPeers, 300); }

function openDM(peerID) {
    const sid = shortID(peerID);
    ensureDMTab(peerID, sid);
    const tab = document.querySelector(`[data-panel="dm-${sid}"]`);
    switchTab(tab);
    renderDMChat(peerID);
}

function callPeer(id) {
    send('call_peer', { peer_id: id });
    document.getElementById('call-status').textContent = 'Calling...';
    document.getElementById('call-stats').style.display = 'grid';
    document.getElementById('hangup-btn').style.display = 'block';
    startCallStats();
    document.querySelector('[data-panel="calls"]').click();
}

function hangup() {
    send('hangup', {});
    resetCallUI();
}

function resetCallUI() {
    document.getElementById('call-status').textContent = 'No active call';
    document.getElementById('call-stats').style.display = 'none';
    document.getElementById('hangup-btn').style.display = 'none';
    stopCallStats();
}

// ── Call Stats ─────────────────────────────────────────────────
function startCallStats() { stopCallStats(); callStatsInterval = setInterval(() => send('get_callstats', {}), 1000); }
function stopCallStats() { if (callStatsInterval) { clearInterval(callStatsInterval); callStatsInterval = null; } }
function renderCallStats(s) {
    document.getElementById('call-status').textContent = `Call active (${Math.round(s.duration)}s)`;
    document.getElementById('stat-latency').textContent = s.latency_ms.toFixed(1);
    document.getElementById('stat-jitter').textContent = s.jitter_ms.toFixed(2);
    document.getElementById('stat-sent').textContent = s.sent;
    document.getElementById('stat-recv').textContent = s.recv;
    document.getElementById('stat-lost').textContent = s.lost;
    document.getElementById('stat-loss').textContent = s.loss_pct.toFixed(1);
}

// ── Info ────────────────────────────────────────────────────────
async function fetchInfo() {
    try {
        const r = await fetch('/api/info');
        const info = await r.json();
        myPeerID = info.peer_id;
        myNick = info.nick;
        document.getElementById('info-peerid').textContent = info.peer_id;
        document.getElementById('info-sn').textContent = info.safety_number;
        document.getElementById('info-nick').textContent = info.nick;
        document.getElementById('nick-display').textContent = info.nick;
        document.getElementById('info-url').textContent = location.href;
    } catch(e) {}
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const unread = tab.querySelector('.unread');
    if (unread) unread.remove();
    const panelId = 'panel-' + tab.dataset.panel;
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add('active');
    if (tab.dataset.panel === 'peers') requestPeers();
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t)));

document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ── Helpers ────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function shortID(s) { return s.substring(s.length - 8); }
function timeNow() { return new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

setInterval(requestPeers, 5000);
connect();
    </script>
</body>

</html>
